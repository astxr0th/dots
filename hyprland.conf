
# ===== MONITORY =====
monitor = HDMI-A-1, 1920x1080@100, 1920x0, 1  #you need to change monitors
monitor = DP-3,    1920x1080@60,   0x0,    1

# ===== ZMIENNE =====
$mod         = SUPER
$terminal    = kitty
$browser     = zen-browser
$filemanager = dolphin
$menu        = quickshell ipc call launcher toggle

# ===== KOLORY (fiolet) =====
$purple_bright = rgba(c084fcff)
$purple_mid    = rgba(a855f7ff)
$purple_dark   = rgba(7c3aedff)
$bg_dark       = rgba(12101aff)
$border_dim    = rgba(3d3060ff)

# ===== ZMIENNE ŚRODOWISKOWE =====
env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, Adwaita
env = GDK_BACKEND, wayland,x11,*
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = MOZ_ENABLE_WAYLAND, 1

# ===== AUTOSTART =====
exec-once = quickshell
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = powerprofilesctl set performance
exec-once = swww-daemon && sleep 0.5 && swww restore
exec-once = hyprpolkitagent

# ===== INPUT =====
input {
    kb_layout    = pl
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

# ===== WYGLĄD =====
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2

    col.active_border   = $purple_bright $purple_dark 45deg
    col.inactive_border = $border_dim

    layout           = dwindle
    resize_on_border = true
}

# ===== DEKORACJE =====
decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity     = 1.0
    inactive_opacity   = 0.88
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.12

    shadow {
        enabled       = true
        range         = 20
        render_power  = 3
        color         = rgba(7c3aed44)
        ignore_window = true
    }

    blur {
        enabled           = true
        size              = 6
        passes            = 3
        new_optimizations = true
        ignore_opacity    = true
        vibrancy          = 0.18
        vibrancy_darkness = 0.5
        popups            = true
    }
}

# ===== DWINDLE =====
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
}

# ===== ANIMACJE =====
animations {
    enabled = true

    # Krzywe Beziera
    bezier = smoothIn,    0.25, 1,    0.5,  1
    bezier = smoothOut,   0.5,  0,    0.75, 0
    bezier = overshot,    0.34, 1.56, 0.64, 1
    bezier = easeInOut,   0.65, 0,    0.35, 1
    bezier = liner,       1,    1,    0,    0

    # Okna
    animation = windowsIn,   1, 6,  overshot,  popin 75%
    animation = windowsOut,  1, 5,  smoothOut, popin 75%
    animation = windowsMove, 1, 5,  smoothIn

    # Fade
    animation = fadeIn,     1, 5,  smoothIn
    animation = fadeOut,    1, 4,  smoothOut
    animation = fadeSwitch, 1, 5,  easeInOut
    animation = fadeDim,    1, 6,  easeInOut
    animation = fadeLayers, 1, 4,  smoothIn

    # Workspace
    animation = workspaces,     1, 6, smoothIn,   slidefadevert 15%
    animation = specialWorkspace, 1, 5, overshot, slidefadevert 20%

    # Border
    animation = border,      1, 8,  liner
    animation = borderangle, 1, 80, liner, loop
}

# ===== MISC =====
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    animate_manual_resizes   = true
    vfr                      = true
}

# ===== REGUŁY WARSTW =====
layerrule = blur on,            match:namespace waybar
layerrule = blur on,            match:namespace quickshell
layerrule = blur on,            match:namespace mako

# ===== WINDOW RULES =====
windowrule = no_anim on,                         match:class ^(fl64.exe)$
windowrule = no_blur on,                         match:class ^(fl64.exe)$
windowrule = no_shadow on,                       match:class ^(fl64.exe)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(fl64.exe)$
windowrule = no_initial_focus on,                match:xwayland true

#
windowrule = float on,    match:class ^(popup_help)$
windowrule = center on,   match:class ^(popup_help)$
windowrule = size 700 500, match:class ^(popup_help)$

# ===== BINDY — SYSTEM & APPS =====
bind = $mod, Z,           exec, $terminal
bind = $mod, W,           exec, $browser
bind = $mod, E,           exec, $filemanager
bind = $mod, Space,       exec, $menu
bindr = SUPER, Super_L,   exec, $menu
bind = $mod, Q,           killactive
bind = $mod, F,           fullscreen
bind = $mod SHIFT, Space, togglefloating
bind = $mod, P,           pseudo
bind = $mod, M,           exit

# ===== FOKUS =====
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# ===== PRZESUWANIE OKIEN =====
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ===== RESIZE =====
binde = $mod ALT, right, resizeactive,  30 0
binde = $mod ALT, left,  resizeactive, -30 0
binde = $mod ALT, up,    resizeactive,  0 -30
binde = $mod ALT, down,  resizeactive,  0  30

# ===== WORKSPACE'Y =====
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# ===== PRZENOSZENIE OKIEN =====
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ===== MYSZ =====
bind  = $mod, mouse_down, workspace, e+1
bind  = $mod, mouse_up,   workspace, e-1
bindm = $mod, mouse:272,  movewindow
bindm = $mod, mouse:273,  resizewindow

# ===== AUDIO =====
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioPlay,        exec, playerctl play-pause
bind  = , XF86AudioNext,        exec, playerctl next
bind  = , XF86AudioPrev,        exec, playerctl previous

# ===== JASNOŚĆ =====
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ===== SCREENSHOTY =====
bind = , Print,       exec, hyprshot -m output
bind = $mod SHIFT, S, exec, hyprshot -m region --clipboard-only

windowrule = float on,      match:class ^(gamescope)$
windowrule = fullscreen on, match:class ^(gamescope)$
windowrule = immediate on,  match:class ^(gamescope)$
windowrule = no_anim on,    match:class ^(gamescope)$
windowrule = monitor HDMI-A-1, match:class ^(gamescope)$

